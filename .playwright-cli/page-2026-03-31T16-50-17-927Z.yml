                - heading [level=2] [ref=e410]:
                  - generic [ref=e411]: You said
                  - paragraph [ref=e412]: Research best practices, frameworks, and tools for systematically discovering, documenting, and maintaining ALL customer journeys in a product — including the edge-case journeys that teams typically miss and that surface as bugs in production. I also need a framework for logging all product decisions in a spec or living document that agents can review and maintain over time, so that state transitions and gaps discovered along the way don't get lost.
                  - paragraph [ref=e413]
                  - paragraph [ref=e414]: "My context:"
                  - paragraph [ref=e415]
                  - paragraph [ref=e416]: I'm building Showtime, an ADHD-friendly macOS day planner. It has multiple interfaces (an Electron GUI app and a Claude Code CLI skill) that share state. The app has 6 main phases a user moves through (Dark Studio → Writer's Room → Live → Intermission → Director Mode → Strike), with sub-states within each phase, and the user can enter/exit these in various orders depending on what they're doing.
                  - paragraph [ref=e417]
                  - paragraph [ref=e418]: "Our problem: we keep finding bugs that are really missing journeys — paths through the product we didn't think about during planning. Examples:"
                  - paragraph [ref=e419]: "- User opens the CLI skill in the afternoon when a show is already halfway through in the GUI app — what should happen?"
                  - paragraph [ref=e420]: "- User is in Intermission, all remaining acts are done, and they try to exit Intermission — the code falls through to an unexpected state"
                  - paragraph [ref=e421]: "- User closes the app during Writer's Room and reopens it 4 hours later — should it resume or start fresh?"
                  - paragraph [ref=e422]: "- Timer expires while the app is in Director Mode — what takes priority?"
                  - paragraph [ref=e423]
                  - paragraph [ref=e424]: These aren't code bugs — they're product gaps. Journeys we never specified because we didn't think of them. The fix always involves going back to figure out what SHOULD happen here before writing code.
                  - paragraph [ref=e425]
                  - paragraph [ref=e426]: "What I'm looking for:"
                  - paragraph [ref=e427]
                  - paragraph [ref=e428]: "1. Journey discovery frameworks — How do product teams systematically enumerate ALL possible customer journeys, including edge cases and error paths? Techniques like: event storming, customer journey mapping, state explosion testing, scenario workshops, what-if analysis, pre-mortems. What's the modern best practice for ensuring you've covered the paths users will actually take (not just the happy path)?"
                  - paragraph [ref=e429]
                  - paragraph [ref=e430]: "2. Gap detection methods — How do teams find the journeys they MISSED? Techniques for finding holes in product specs before users do. Things like: model-based testing that auto-discovers untested paths, property-based testing that generates random user sequences, chaos journey testing, adversarial user simulation. Are there AI tools that can read a product spec and identify missing edge cases?"
                  - paragraph [ref=e431]
                  - paragraph [ref=e432]: "3. Journey documentation formats — Once you've discovered all the journeys, how do you document them in a way that's: (a) easy for AI coding agents to consume, (b) version-controlled alongside code, (c) maintained as a living document, not a throwaway artifact? Formats like: Given/When/Then scenarios, user story maps, customer journey maps as code, event catalogs. What format works best for stateful apps with multiple phases?"
                  - paragraph [ref=e433]
                  - paragraph [ref=e434]: 4. Tools that generate journeys from code — Are there tools that can analyze an existing codebase (like our Zustand store with 650+ lines of state transitions) and reverse-engineer all possible journeys? Static analysis tools, state exploration tools, model checkers that enumerate all reachable states and transitions? Especially for React/TypeScript/Electron apps.
                  - paragraph [ref=e435]
                  - paragraph [ref=e436]: "5. Preventing journey gaps in ongoing development — When adding new features, how do teams ensure they don't introduce new gaps? Techniques like: mandatory journey review checklists, state transition matrices that must be updated, property-based tests that catch new unreachable states. How do companies like Stripe, Shopify, or Figma prevent payment flow or collaboration flow gaps?"
                  - paragraph [ref=e437]
                  - paragraph [ref=e438]: "6. Real-world war stories — Examples from companies where missing journeys caused significant bugs. How they discovered the gap, how they fixed the process to prevent it from happening again. Especially interested in: (a) stateful apps (chat, collaboration, workflow tools), (b) apps with multiple entry points (GUI + CLI + API), (c) apps with time-dependent state (timers, sessions, reconnection)."
                  - paragraph [ref=e439]
                  - paragraph [ref=e440]: 7. Integration with spec-driven development — I use OpenSpec + Loki Mode (autonomous AI agent execution) for development. How can journey discovery and gap detection be integrated into a spec-driven workflow? Can AI agents be prompted to automatically identify missing journeys when given a product spec? Are there OpenSpec, Kiro, or Spec Kit extensions for journey coverage analysis?
                  - paragraph [ref=e441]
                  - paragraph [ref=e442]: 8. The journey registry concept — Is there a best practice for maintaining a single, canonical registry of all known customer journeys that evolves with the product? Something analogous to a database migration system but for customer journeys — where adding a new feature requires explicitly declaring what new journeys it creates and what existing journeys it modifies? How do teams keep this from becoming stale?
                  - paragraph [ref=e443]
                  - paragraph [ref=e444]: "9. A living framework for product decisions and state transitions — I need a way to log all product decisions — every state transition, every edge case resolution, every what should happen when X answer — in a format that: (a) AI agents can review before implementing changes, (b) accumulates over time rather than being rewritten per feature, (c) surfaces gaps proactively (you added a new phase but haven't specified what happens when the timer is running and the user enters it), (d) integrates with spec-driven development tools like OpenSpec so that when a new change is proposed, the framework can check whether all existing journeys are still covered. Essentially: how do teams build and maintain a decision log + journey coverage matrix that grows with the product and acts as the source of truth for what should the product do in every situation?"
                  - paragraph [ref=e445]
                  - paragraph [ref=e446]: Please include links to blog posts, frameworks, tools, GitHub repos, conference talks, and real examples. Prioritize practical, implementable approaches over theoretical frameworks. I want something my AI agents can use to find gaps before users do.
